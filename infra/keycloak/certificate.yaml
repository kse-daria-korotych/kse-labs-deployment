apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: keycloak-tls
spec:
  secretName: keycloak-tls
  commonName: keycloak.192.168.151.10.nip.io
  dnsNames:
    - keycloak.192.168.151.10.nip.io
  duration: 720h
  renewBefore: 240h
  issuerRef:
    name: vault-pki-int
    kind: ClusterIssuer
    group: cert-manager.io
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
