apiVersion: apps/v1
kind: Deployment
metadata:
  name: openfga
  labels:
    app.kubernetes.io/name: openfga
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openfga
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openfga
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      # Run the schema migration before the server starts. Using an
      # initContainer (instead of an ArgoCD PreSync hook) means the pod only
      # starts once the ESO-managed Secret exists, so there is no ordering race.
      initContainers:
        - name: migrate
          image: openfga/openfga:v1.17.1
          args: ["migrate"]
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: openfga-db-credentials
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openfga-db-credentials
                  key: db-password
            - name: OPENFGA_DATASTORE_URI
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@192.168.50.10:5432/openfga?sslmode=disable"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      containers:
        - name: openfga
          image: openfga/openfga:v1.17.1
          args:
            - run
            - --playground-enabled=false
          env:
            - name: OPENFGA_DATASTORE_ENGINE
              value: postgres
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: openfga-db-credentials
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openfga-db-credentials
                  key: db-password
            - name: OPENFGA_DATASTORE_URI
              value: "postgres://$(DB_USER):$(DB_PASSWORD)@192.168.50.10:5432/openfga?sslmode=disable"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 8081
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
